name: Close Pull Request

on:
  pull_request_target:
    types: [opened]

jobs:
  close-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: superbrothers/close-pull-request@v3
        with:
          comment: |
            Hi there! 👋

            Thank you so much for wanting to contribute to phpmlkit/onnxruntime!

            However, this repository is a **read-only subtree split** of our main monorepo. This means:
            - All changes must be made in the main repository
            - This package is automatically generated from the monorepo
            - PRs submitted here will be closed automatically

            ## Please submit your Pull Request here instead:

            **https://github.com/phpmlkit/onnxruntime**

            That's where all the development happens, and we'd love to review your contribution there!

            For more details about our monorepo workflow, check out:
            https://github.com/phpmlkit/onnxruntime/blob/main/MONOREPO.md

            Thanks for understanding! 🙏
